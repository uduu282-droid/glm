<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM AI Chat - Render</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
        }
        .message.assistant .message-content {
            background: white;
            border: 1px solid #e9ecef;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .input-container {
            padding: 20px;
            background: white;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        .input-container input:focus { border-color: #667eea; }
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.5; }
        .settings {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .settings select, .settings input {
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 6px;
        }
        .status-bar {
            padding: 8px 20px;
            background: #f0f0f0;
            font-size: 12px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 GLM AI Chat</h1>
            <p>Powered by FeatherLabs • Deployed on Render</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">Hello! I'm GLM AI. How can I help you today? 😊</div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
        
        <div class="settings">
            <label>Model: 
                <select id="modelSelect">
                    <option value="glm-4.6">GLM-4.6</option>
                    <option value="glm-4.7">GLM-4.7</option>
                    <option value="glm-4.6v">GLM-4.6v (Vision)</option>
                    <option value="glm-4.5">GLM-4.5</option>
                </select>
            </label>
            <label>Temp: 
                <input type="number" id="temperature" value="0.7" min="0" max="1" step="0.1" style="width:60px;">
            </label>
        </div>
        
        <div class="status-bar" id="statusBar">Ready</div>
    </div>

    <script>
        // Auto-detect: use proxy API on Render, direct API locally
        const USE_PROXY = window.location.protocol !== 'file:';
        const API_URL = USE_PROXY ? '/api/chat' : 'https://api.featherlabs.online/v1/chat/completions';
        const API_KEY = 'vtx-RUmIksxLD8Qf8njF3JsMXLqICnZEohaM';
        
        let history = [];
        let loading = false;

        const chat = document.getElementById('chatContainer');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const modelSel = document.getElementById('modelSelect');
        const temp = document.getElementById('temperature');
        const status = document.getElementById('statusBar');

        function addMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'assistant'}`;
            div.innerHTML = `<div class="message-content">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const msg = input.value.trim();
            if (!msg || loading) return;
            
            addMsg(msg, true);
            input.value = '';
            loading = true;
            btn.disabled = true;
            status.textContent = 'Thinking...';
            
            try {
                history.push({ role: 'user', content: msg });
                
                let requestOptions;
                
                if (USE_PROXY) {
                    // Use server proxy (Render)
                    requestOptions = {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: modelSel.value,
                            messages: history.slice(-10),
                            temperature: parseFloat(temp.value)
                        })
                    };
                } else {
                    // Direct API call (local)
                    requestOptions = {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: modelSel.value,
                            messages: history.slice(-10),
                            temperature: parseFloat(temp.value)
                        })
                    };
                }
                
                const res = await fetch(API_URL, requestOptions);
                
                if (!res.ok) {
                    const error = await res.json().catch(() => ({ error: 'Unknown error' }));
                    throw new Error(`HTTP ${res.status}: ${error.message || error.error || 'API Error'}`);
                }
                
                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || 'No response';
                
                addMsg(reply, false);
                history.push({ role: 'assistant', content: reply });
                status.textContent = 'Ready';
                
            } catch (err) {
                addMsg(`Error: ${err.message}`, false);
                status.textContent = 'Error occurred';
            } finally {
                loading = false;
                btn.disabled = false;
                input.focus();
            }
        }

        btn.onclick = send;
        input.onkeypress = e => { if (e.key === 'Enter') send(); };
        input.focus();
        
        // Show connection info
        console.log('🔗 Using:', USE_PROXY ? 'Server Proxy (Render)' : 'Direct API');
        console.log('🌐 API URL:', API_URL);
    </script>
</body>
</html>
