<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLM-5 Chat - Free AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.assistant .message-content {
            background: white;
            border: 1px solid #e9ecef;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .input-container {
            padding: 20px;
            background: white;
            display: flex;
            gap: 10px;
        }
        .input-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        .input-container input:focus { border-color: #667eea; }
        .send-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-bar {
            padding: 8px 20px;
            background: #f0f0f0;
            font-size: 12px;
            text-align: center;
            color: #666;
        }
        .typing { font-style: italic; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 GLM-5 Chat</h1>
            <p>Powered by Z.ai • No API Key Required!</p>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">Hello! I'm GLM-5. How can I help you today? 😊</div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
        
        <div class="status-bar" id="statusBar">Ready</div>
    </div>

    <script>
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);
        let chatStarted = false;
        let loading = false;

        const chat = document.getElementById('chatContainer');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('statusBar');

        function addMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'assistant'}`;
            div.innerHTML = `<div class="message-content">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const msg = input.value.trim();
            if (!msg || loading) return;
            
            addMsg(msg, true);
            input.value = '';
            loading = true;
            btn.disabled = true;
            status.textContent = chatStarted ? 'Thinking...' : 'Starting chat...';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        session_id: sessionId
                    })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Request failed');
                }
                
                const data = await res.json();
                
                if (!chatStarted) {
                    chatStarted = true;
                    addMsg('Chat started! Send another message to chat.', false);
                } else {
                    addMsg(data.response || '(No response)', false);
                }
                
                status.textContent = `Ready (Turn #${data.turn || 0})`;
                
            } catch (err) {
                addMsg(`Error: ${err.message}`, false);
                status.textContent = 'Error occurred';
            } finally {
                loading = false;
                btn.disabled = false;
                input.focus();
            }
        }

        btn.onclick = send;
        input.onkeypress = e => { if (e.key === 'Enter') send(); };
        input.focus();
    </script>
</body>
</html>
