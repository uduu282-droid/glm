services:
  # GLM-5 Chat Web Service (Python)
- type: web
  name: glm-5-chat
  env: python
  region: oregon
  plan: free
  branch: main
  rootDir: .
  buildCommand: pip install --upgrade pip && pip install -r requirements.txt
  startCommand: python glm_server.py --host 0.0.0.0 --port $PORT
  healthCheckPath: /health
  envVars:
  - key: PORT
    value: 10000
