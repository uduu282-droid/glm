<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Remover - Before/After Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        
        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .image-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .image-header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        
        .before-header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .after-header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        
        .image-wrapper {
            position: relative;
            background: repeating-conic-gradient(#808080 0% 25%, #ffffff 0% 50%) 50% / 20px 20px;
            padding: 20px;
        }
        
        .image-wrapper img {
            width: 100%;
            height: 500px;
            object-fit: contain;
            display: block;
        }
        
        .image-info {
            padding: 15px;
            background: #f8f9ff;
            border-top: 2px solid #e0e0e0;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .info-label { color: #666; font-weight: 500; }
        .info-value { color: #333; font-weight: 600; }
        
        .checkered-bg {
            background: repeating-conic-gradient(#808080 0% 25%, #ffffff 0% 50%) 50% / 20px 20px;
        }
        
        .download-section {
            text-align: center;
            margin-top: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }
        
        .transparency-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Before & After Comparison</h1>
        
        <div class="comparison-container">
            <!-- Before -->
            <div class="image-card">
                <div class="image-header before-header">📸 Original Image</div>
                <div class="image-wrapper">
                    <img id="beforeImage" src="" alt="Original">
                </div>
                <div class="image-info">
                    <div class="info-row">
                        <span class="info-label">File:</span>
                        <span class="info-value" id="beforeName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Size:</span>
                        <span class="info-value" id="beforeSize">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Type:</span>
                        <span class="info-value" id="beforeType">-</span>
                    </div>
                </div>
            </div>
            
            <!-- After -->
            <div class="image-card">
                <div class="image-header after-header">✨ Background Removed</div>
                <div class="image-wrapper checkered-bg">
                    <img id="afterImage" src="" alt="Background Removed">
                    <div class="transparency-indicator">✓ Transparent Background</div>
                </div>
                <div class="image-info">
                    <div class="info-row">
                        <span class="info-label">File:</span>
                        <span class="info-value" id="afterName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Size:</span>
                        <span class="info-value" id="afterSize">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Type:</span>
                        <span class="info-value" id="afterType">PNG with Alpha</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="download-section">
            <a href="" id="downloadBtn" class="btn" download="background_removed.png">⬇️ Download Result</a>
        </div>
    </div>

    <script>
        // Get the output file from query parameter or use default
        const urlParams = new URLSearchParams(window.location.search);
        const outputFile = urlParams.get('output') || 'output_1774203147507.png';
        const inputFile = urlParams.get('input') || 'magic_studio_test.png';
        
        // Load images
        const beforeImg = document.getElementById('beforeImage');
        const afterImg = document.getElementById('afterImage');
        const downloadBtn = document.getElementById('downloadBtn');
        
        // Set before image
        beforeImg.src = inputFile;
        beforeImg.onload = () => {
            document.getElementById('beforeName').textContent = inputFile;
            document.getElementById('beforeSize').textContent = 'Loading...';
            
            // Try to get file size
            fetch(inputFile)
                .then(r => r.blob())
                .then(blob => {
                    document.getElementById('beforeSize').textContent = (blob.size / 1024).toFixed(2) + ' KB';
                })
                .catch(() => {
                    document.getElementById('beforeSize').textContent = 'Unknown';
                });
        };
        
        // Set after image
        afterImg.src = outputFile;
        afterImg.onload = () => {
            document.getElementById('afterName').textContent = outputFile;
            
            fetch(outputFile)
                .then(r => r.blob())
                .then(blob => {
                    document.getElementById('afterSize').textContent = (blob.size / 1024).toFixed(2) + ' KB';
                })
                .catch(() => {
                    document.getElementById('afterSize').textContent = 'Unknown';
                });
        };
        
        // Setup download
        downloadBtn.href = outputFile;
        
        // Handle errors
        afterImg.onerror = () => {
            alert('Could not load the processed image. Make sure both images are in the same folder as this HTML file.');
        };
    </script>
</body>
</html>
