<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Background Removed Images</title>
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #f0f2f5; 
            padding: 20px; 
            margin: 0;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { color: #333; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .card-header {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: bold;
            text-align: center;
        }
        
        .image-container {
            position: relative;
            background: repeating-conic-gradient(#808080 0% 25%, #ffffff 0% 50%) 50% / 20px 20px;
            padding: 20px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }
        
        .card-footer {
            padding: 15px;
            background: #f8f9ff;
            border-top: 2px solid #e0e0e0;
        }
        
        .info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .transparency-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Your Background Removed Images</h1>
        <p class="subtitle">Checkered pattern shows transparent areas</p>
        
        <div id="content" class="gallery"></div>
    </div>

    <script>
        // List of output files to display
        const outputFiles = [
            {
                original: 'magic_studio_test.png',
                processed: 'output_1774203147507.png',
                title: 'Test Image'
            }
        ];
        
        const contentDiv = document.getElementById('content');
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        async function getFileSize(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                const contentLength = response.headers.get('content-length');
                return contentLength ? parseInt(contentLength) : 0;
            } catch {
                return 0;
            }
        }
        
        function createCard(file, index) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const timestamp = new Date().toLocaleString();
            
            card.innerHTML = `
                <div class="card-header">
                    ${file.title || 'Background Removed Image'}
                </div>
                <div class="image-container">
                    <div class="transparency-badge">✓ Transparent</div>
                    <img src="${file.processed}" alt="Background removed" id="img-${index}">
                </div>
                <div class="card-footer">
                    <div class="info">
                        <span><strong>Original:</strong> ${file.original}</span>
                        <span><strong>Output:</strong> ${file.processed}</span>
                    </div>
                    <div class="info">
                        <span><strong>Processed:</strong> ${timestamp}</span>
                        <span id="size-${index}"><strong>Size:</strong> Loading...</span>
                    </div>
                    <a href="${file.processed}" download class="btn">⬇️ Download Result</a>
                </div>
            `;
            
            // Load image size
            getFileSize(file.processed).then(size => {
                const sizeEl = document.getElementById(`size-${index}`);
                if (sizeEl) {
                    sizeEl.innerHTML = `<strong>Size:</strong> ${formatBytes(size)}`;
                }
            });
            
            // Handle load errors
            const img = document.getElementById(`img-${index}`);
            img.onerror = () => {
                img.parentElement.innerHTML = `
                    <div class="error">
                        ⚠️ Could not load image. Make sure the file exists in the same folder.<br><br>
                        File: ${file.processed}
                    </div>
                `;
            };
            
            return card;
        }
        
        // Add all cards
        outputFiles.forEach((file, index) => {
            contentDiv.appendChild(createCard(file, index));
        });
        
        // Instructions
        const instructions = document.createElement('div');
        instructions.style.cssText = 'background: white; padding: 20px; border-radius: 15px; margin-top: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);';
        instructions.innerHTML = `
            <h2 style="margin-bottom: 15px;">📖 How to View Your Images</h2>
            <ol style="line-height: 2; color: #555;">
                <li><strong>Checkered background</strong> means the area is TRANSPARENT</li>
                <li>Click the <strong>Download Result</strong> button to save the image</li>
                <li>Use the PNG file in Photoshop, Canva, or any design software</li>
                <li>The transparency will work in most modern applications</li>
            </ol>
            <div style="margin-top: 20px; padding: 15px; background: #e3f2fd; border-left: 4px solid #2196F3; border-radius: 5px;">
                <strong>💡 Tip:</strong> If Windows Photo Viewer says "format not supported", try:
                <ul style="margin-top: 10px;">
                    <li>Opening in Paint, Photoshop, or another image editor</li>
                    <li>Dragging the file into a web browser</li>
                    <li>Using the Photos app instead of Windows Photo Viewer</li>
                </ul>
            </div>
        `;
        
        contentDiv.appendChild(instructions);
    </script>
</body>
</html>
