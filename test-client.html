<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overchat Worker - Test Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; }
        .config { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .config label { display: block; margin-bottom: 5px; font-weight: bold; }
        .config select, .config input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .chat-container { background: white; border-radius: 8px; overflow: hidden; }
        .messages { height: 500px; overflow-y: auto; padding: 20px; background: #fafafa; }
        .message { margin-bottom: 15px; padding: 12px; border-radius: 8px; }
        .message.user { background: #e3f2fd; margin-left: 20%; }
        .message.assistant { background: #f3e5f5; margin-right: 20%; }
        .message.error { background: #ffebee; color: #c62828; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin-right: 10px; }
        .input-area button { padding: 12px 24px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .input-area button:hover { background: #1565c0; }
        .input-area button:disabled { background: #bdbdbd; cursor: not-allowed; }
        .status { padding: 10px; background: #fff3e0; border-bottom: 1px solid #ffe0b2; }
        .model-badge { display: inline-block; padding: 4px 8px; background: #1976d2; color: white; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Overchat Worker Test Client</h1>
        
        <div class="config">
            <label for="workerUrl">Worker URL:</label>
            <input type="text" id="workerUrl" value="http://localhost:8787" placeholder="http://localhost:8787">
            
            <label for="modelSelect">Model:</label>
            <select id="modelSelect">
                <option value="claude-sonnet-3-5">Claude Sonnet 3.5</option>
                <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
                <option value="claude-opus-4-6">Claude Opus 4.6</option>
                <option value="gpt-5">GPT-5</option>
                <option value="gpt-4o">GPT-4o</option>
                <option value="gemini-2-5-pro">Gemini 2.5 Pro</option>
                <option value="deepseek-v3">DeepSeek V3</option>
                <option value="mistral">Mistral</option>
                <option value="grok-3">Grok 3</option>
            </select>
        </div>
        
        <div class="chat-container">
            <div class="status">
                <span class="model-badge" id="currentModel">claude-sonnet-3-5</span>
                <span id="connectionStatus">Ready</span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        let chatId = null;
        const messagesDiv = document.getElementById('messages');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelect = document.getElementById('modelSelect');
        const currentModel = document.getElementById('currentModel');
        const connectionStatus = document.getElementById('connectionStatus');
        
        modelSelect.addEventListener('change', () => {
            currentModel.textContent = modelSelect.value;
            chatId = null; // Reset chat when changing models
        });
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;
            connectionStatus.textContent = 'Sending...';
            
            const workerUrl = document.getElementById('workerUrl').value;
            const url = `${workerUrl}/v1/chat/completions`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        message: message,
                        chat_id: chatId,
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }
                
                // Create placeholder for assistant response
                const assistantMessageDiv = addMessage('', 'assistant');
                let fullResponse = '';
                
                // Read streaming response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const event = JSON.parse(data);
                                const delta = event.choices?.[0]?.delta?.content || '';
                                if (delta) {
                                    fullResponse += delta;
                                    assistantMessageDiv.textContent = fullResponse;
                                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }
                
                chatId = chatId || crypto.randomUUID();
                connectionStatus.textContent = 'Ready';
                
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'error');
                connectionStatus.textContent = 'Error occurred';
            } finally {
                sendBtn.disabled = false;
            }
        }
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
